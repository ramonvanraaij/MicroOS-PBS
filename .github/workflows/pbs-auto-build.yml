name: Build and Release PBS Container

on:
  schedule:
    - cron: '0 0 * * *' # Run every 24 hours
  workflow_dispatch:      # Allow manual run
    inputs:
      mode:
        description: 'Build Mode'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - force
      check-upstream:
        description: 'Check for latest upstream version'
        required: false
        default: false
        type: boolean

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          # Schedule events always run on the default branch (main).
          # Override to develop so automated checks use the correct branch.
          ref: ${{ github.event_name == 'schedule' && 'develop' || github.ref }}
          fetch-depth: 0

      - name: Resolve Branch Name
        id: branch
        run: |
          # github.ref_name always reflects the trigger ref (main for schedule).
          # Compute the actual branch we checked out.
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "name=develop" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine Target Version
        id: target
        run: |
          # Priority: Input Mode > GitHub Event
          INPUT_MODE="${{ github.event.inputs.mode }}"
          CHECK_UPSTREAM="${{ github.event.inputs.check-upstream }}"
          EVENT_NAME="${{ github.event_name }}"
          BRANCH_NAME="${{ steps.branch.outputs.name }}"
          
          CURRENT_VERSION=$(sed 's/^v//' VERSION)
          echo "Current Version: $CURRENT_VERSION"
          echo "Branch Name: $BRANCH_NAME"
          
          UPDATE_REPO_VERSION="false"
          BUILD_IMAGE="false"
          PROMOTE_IMAGE="false"
          TARGET_VERSION="$CURRENT_VERSION"
          SOURCE_VERSION="$CURRENT_VERSION"
          IS_PRERELEASE="true"
          
          # Use external script so scheduled runs (which load the workflow
          # from main) still execute the latest detection logic checked out
          # from develop.
          check_upstream() {
            bash scripts/check_upstream.bash
          }

          # 1. Manual Workflow Dispatch
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            MODE="$INPUT_MODE"
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            BUILD_IMAGE="true"
            
            if [[ "$BRANCH_NAME" == "develop" ]]; then
              if [ "$CHECK_UPSTREAM" == "true" ]; then
                echo "Checking latest upstream version..."
                LATEST_UPSTREAM=$(check_upstream)
                if [ -z "$LATEST_UPSTREAM" ]; then
                  echo "Error: Could not extract version number from upstream."
                  exit 1
                fi
                echo "Latest Upstream: $LATEST_UPSTREAM"
                
                # Strip -RC/-dev suffixes for comparison, keep revision (X.Y.Z-N)
                BASE_CURRENT=$(echo "$CURRENT_VERSION" | sed -E 's/-(RC|dev-.*)$//')
                if [ "$BASE_CURRENT" != "$LATEST_UPSTREAM" ]; then
                  TARGET_VERSION="${LATEST_UPSTREAM}-RC"
                  UPDATE_REPO_VERSION="true"
                  echo "New version detected: $TARGET_VERSION"
                else
                  echo "Upstream matches current version. Building dev version instead."
                  DATE_SUFFIX=$(date +'%Y%m%d-%H%M')
                  TARGET_VERSION="${CURRENT_VERSION}-dev-${DATE_SUFFIX}"
                fi
              else
                # Manual build on develop (no upstream check): version-dev-timestamp
                DATE_SUFFIX=$(date +'%Y%m%d-%H%M')
                TARGET_VERSION="${CURRENT_VERSION}-dev-${DATE_SUFFIX}"
              fi
            else
              # Manual build on main: stable release
              TARGET_VERSION=$(echo "$CURRENT_VERSION" | sed -E 's/-RC$//')
              IS_PRERELEASE="false"
              if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
                UPDATE_REPO_VERSION="true"
                BUILD_IMAGE="false"
                PROMOTE_IMAGE="true"
                SOURCE_VERSION="$CURRENT_VERSION"
                echo "Promoting to stable release: $TARGET_VERSION from $SOURCE_VERSION"
              else
                # VERSION already stable: nothing to promote and no rebuild
                # implied. Skip to avoid silently overwriting the existing
                # digest behind the :latest tag.
                BUILD_IMAGE="false"
                echo "Version $CURRENT_VERSION is already stable. Nothing to do."
              fi
            fi
          fi

          # 2. Automated Schedule (Only on develop)
          if [ "$EVENT_NAME" == "schedule" ]; then
            if [ "$BRANCH_NAME" != "develop" ]; then
              echo "Error: Automated checks only run on the develop branch."
              exit 0
            fi

            echo "Checking latest upstream version..."
            LATEST_UPSTREAM=$(check_upstream)

            if [ -z "$LATEST_UPSTREAM" ]; then
              echo "Error: Could not extract version number from upstream."
              exit 1
            fi

            echo "Latest Upstream: $LATEST_UPSTREAM"

            # Strip -RC/-dev suffixes for comparison, keep revision (X.Y.Z-N)
            BASE_CURRENT=$(echo "$CURRENT_VERSION" | sed -E 's/-(RC|dev-.*)$//')

            if [ "$BASE_CURRENT" != "$LATEST_UPSTREAM" ]; then
              echo "mode=auto" >> $GITHUB_OUTPUT
              TARGET_VERSION="${LATEST_UPSTREAM}-RC"
              BUILD_IMAGE="true"
              UPDATE_REPO_VERSION="true"
            fi
          fi
          
          echo "version=$TARGET_VERSION" >> $GITHUB_OUTPUT
          echo "source_version=$SOURCE_VERSION" >> $GITHUB_OUTPUT
          echo "update_needed=$BUILD_IMAGE" >> $GITHUB_OUTPUT
          echo "promote_image=$PROMOTE_IMAGE" >> $GITHUB_OUTPUT
          echo "update_repo_version=$UPDATE_REPO_VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

      - name: Update Repo Version
        if: steps.target.outputs.update_repo_version == 'true'
        run: |
          echo "v${{ steps.target.outputs.version }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          if ! git diff --cached --quiet; then
            git commit -m "chore: Update version to ${{ steps.target.outputs.version }}"
            git push
          else
            echo "No version change to commit."
          fi

      - name: Login to GHCR
        if: steps.target.outputs.update_needed == 'true' || steps.target.outputs.promote_image == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.target.outputs.promote_image == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Lowercase Repository Name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        if: steps.target.outputs.update_needed == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.target.outputs.update_needed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build Image
        if: steps.target.outputs.update_needed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/Dockerfile.build
          target: release_env
          load: true
          provenance: false
          sbom: false
          build-args: |
            VERSION=${{ steps.target.outputs.version }}
          labels: |
            org.opencontainers.image.title=Proxmox Backup Server
            org.opencontainers.image.description=Proxmox Backup Server (PBS) container image. Optimized for MicroOS with Podman Quadlets, also compatible with Docker and Podman Compose. Pull: docker pull ghcr.io/ramonvanraaij/proxmox-backup-server:latest
            org.opencontainers.image.version=${{ steps.target.outputs.version }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.source=https://github.com/ramonvanraaij/MicroOS-PBS
            org.opencontainers.image.url=https://github.com/ramonvanraaij/MicroOS-PBS
            org.opencontainers.image.documentation=https://github.com/ramonvanraaij/MicroOS-PBS#readme
            org.opencontainers.image.authors=Rámon van Raaij (https://ramon.vanraaij.eu)
            org.opencontainers.image.vendor=Rámon van Raaij
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.base.name=docker.io/library/debian:trixie-slim
          tags: |
            pbs-test-ci:latest
            ${{ steps.target.outputs.is_prerelease == 'false' && format('ghcr.io/{0}/proxmox-backup-server:latest', github.repository_owner) || '' }}
            ${{ steps.branch.outputs.name == 'develop' && format('ghcr.io/{0}/proxmox-backup-server:develop', github.repository_owner) || '' }}
            ghcr.io/${{ github.repository_owner }}/proxmox-backup-server:${{ steps.target.outputs.version }}

      - name: Run Integration Test
        if: steps.target.outputs.update_needed == 'true'
        env:
          TEST_IMAGE_NAME: pbs-test-ci:latest
        run: |
          docker pull debian:trixie-slim
          chmod +x local_test.bash local_cleanup.bash
          ./local_test.bash

      - name: Push Image to GHCR
        if: steps.target.outputs.update_needed == 'true'
        run: |
          # Push every GHCR tag that build-push-action loaded into the
          # local daemon. Avoids a second full rebuild of identical layers.
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep "^ghcr\.io/${{ github.repository_owner }}/proxmox-backup-server:" \
            | while read -r tag; do
                echo ">> Pushing $tag"
                docker push "$tag"
              done

      - name: Promote RC Image to Stable
        if: steps.target.outputs.promote_image == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          SOURCE: ${{ steps.target.outputs.source_version }}
          TARGET: ${{ steps.target.outputs.version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          GHCR_REPO="ghcr.io/${OWNER}/proxmox-backup-server"

          # 1. Pull the RC image and verify before any destructive action.
          # Bail out before the API delete if the pull fails for any reason.
          docker pull "${GHCR_REPO}:${SOURCE}"

          # 2. Find the RC package version id. Requires the RC image to
          # currently carry the source version tag. Pass SOURCE to jq via
          # --arg so the filter is not vulnerable to quoting issues if the
          # version string ever contains jq-significant characters.
          MATCHES=$(gh api \
            "/users/${OWNER}/packages/container/proxmox-backup-server/versions" \
            | jq -r --arg src "$SOURCE" \
                '.[] | select(.metadata.container.tags | contains([$src])) | "\(.id)\t\(.metadata.container.tags | join(","))"')
          MATCH_COUNT=$(printf '%s\n' "$MATCHES" | grep -c . || true)
          if [ "$MATCH_COUNT" -eq 0 ]; then
            echo "Error: no GHCR package version found with tag ${SOURCE}"
            exit 1
          fi
          if [ "$MATCH_COUNT" -gt 1 ]; then
            echo "Error: expected one GHCR package version with tag ${SOURCE}, found $MATCH_COUNT:"
            printf '%s\n' "$MATCHES"
            exit 1
          fi
          RC_VERSION_ID=$(printf '%s' "$MATCHES" | cut -f1)
          RC_TAGS=$(printf '%s' "$MATCHES" | cut -f2)
          echo "Deleting RC package version $RC_VERSION_ID (tags: ${RC_TAGS})"

          # 3. Delete the RC version. Removes all tags on this digest (the
          # ${SOURCE} tag plus any others such as `develop`). GHCR allows
          # immediate re-push of the same digest right after deletion
          # (verified empirically).
          gh api --method DELETE \
            "/users/${OWNER}/packages/container/proxmox-backup-server/versions/${RC_VERSION_ID}"

          # 4. Re-push the locally cached image as stable + latest. This
          # creates a fresh package version whose only tags are the stable
          # ones, so the Versions UI stays clean.
          docker tag "${GHCR_REPO}:${SOURCE}" "${GHCR_REPO}:${TARGET}"
          docker tag "${GHCR_REPO}:${SOURCE}" "${GHCR_REPO}:latest"
          docker push "${GHCR_REPO}:${TARGET}"
          docker push "${GHCR_REPO}:latest"

          # 5. Docker Hub: never had RC tags, so a normal retag+push is fine.
          DH_REPO="docker.io/${DOCKERHUB_USERNAME}/proxmox-backup-server"
          docker tag "${GHCR_REPO}:${SOURCE}" "${DH_REPO}:${TARGET}"
          docker tag "${GHCR_REPO}:${SOURCE}" "${DH_REPO}:latest"
          docker push "${DH_REPO}:${TARGET}"
          docker push "${DH_REPO}:latest"

      - name: Create or Update GitHub Release
        if: steps.target.outputs.update_needed == 'true' || steps.target.outputs.promote_image == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ steps.target.outputs.is_prerelease }}" == "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          
          PACKAGE_URL="https://github.com/${{ github.repository }}/pkgs/container/proxmox-backup-server"
          VERSION="${{ steps.target.outputs.version }}"
          BASE_VERSION=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          TAG="v${VERSION}"
          BRANCH="${{ steps.branch.outputs.name }}"
          # Determine build type note from concrete workflow state
          # (promote_image flag + version suffix) rather than MODE, which
          # does not reliably distinguish promotion vs. RC build.
          BUILD_NOTE=""
          if [ "${{ steps.target.outputs.promote_image }}" == "true" ]; then
            BUILD_NOTE="> **Stable Release** — manually verified and promoted from the develop branch."
          elif [[ "$VERSION" == *-RC ]]; then
            BUILD_NOTE="> **Release Candidate** — automated build triggered by upstream version detection. Pending verification before stable release."
          elif [[ "$VERSION" == *-dev-* ]]; then
            BUILD_NOTE="> **Development Build** — testing build from the develop branch."
          fi

          # Build a changelog of commit subjects since the previous release.
          # Log against origin/develop so stable promotions show real commits
          # instead of the squash-merge line on main.
          # Anchor PREV_TAG to a tag whose commit is reachable from
          # origin/develop. Stable tags live on main's squash commits and
          # have no shared ancestry with develop, so --merged origin/develop
          # excludes them naturally and picks the latest develop-side tag
          # (the previous RC or dev build). Version sort is used instead of
          # creatordate to avoid non-deterministic ordering caused by annotated
          # vs lightweight tag object dates.
          PREV_TAG=$(git tag --merged origin/develop --sort=-version:refname \
            | grep -v "^v${VERSION}\$" | head -n 1)
          CHANGES=""
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..origin/develop" --pretty=format:"- %s" 2>/dev/null \
              | grep -vE "^- chore: Update version to|^- chore\(release\): merge develop into main|^- Merge " \
              || true)
          fi

          NOTES_FILE=$(mktemp)
          {
            [ -n "$BUILD_NOTE" ] && echo "$BUILD_NOTE" && echo ""
            if [ -n "$CHANGES" ]; then
              echo "### Changes"
              echo ""
              printf '%s\n' "$CHANGES"
              echo ""
            fi
            echo "### Container Image"
            echo ""
            echo "| Tag | Image |"
            echo "| :-- | :-- |"
            echo "| \`${VERSION}\` | \`ghcr.io/ramonvanraaij/proxmox-backup-server:${VERSION}\` |"
            [ "$BRANCH" == "main" ] && echo "| \`latest\` | \`ghcr.io/ramonvanraaij/proxmox-backup-server:latest\` |"
            [ "$BRANCH" == "develop" ] && echo "| \`develop\` | \`ghcr.io/ramonvanraaij/proxmox-backup-server:develop\` |"
            echo ""
            echo "### 🚀 Deployment Options"
            echo ""
            echo "#### Option A: OpenSUSE MicroOS (Quadlets)"
            echo "Clone the repository and run the interactive setup script for a fully automated, systemd-managed deployment:"
            echo '```bash'
            echo "git clone https://github.com/ramonvanraaij/MicroOS-PBS.git"
            echo "cd MicroOS-PBS"
            echo "chmod +x setup_microos.bash"
            echo "./setup_microos.bash"
            echo '```'
            echo ""
            echo "#### Option B: Podman / Docker (Manual)"
            echo '```bash'
            echo "docker pull ghcr.io/ramonvanraaij/proxmox-backup-server:${VERSION}"
            echo ""
            echo "docker run -d \\"
            echo "    --name pbs \\"
            echo "    -p 8007:8007 \\"
            echo "    --tmpfs /run \\"
            echo '    -v $(pwd)/data/config:/etc/proxmox-backup \'
            echo '    -v $(pwd)/data/datastores:/var/lib/proxmox-backup \'
            echo "    ghcr.io/ramonvanraaij/proxmox-backup-server:${VERSION}"
            echo '```'
            echo ""
            echo "Web UI: \`https://localhost:8007\` — Default login: \`admin@pbs\` / \`pbspbs\`"
            echo ""
            echo "### 🛠️ Advanced Usage"
            echo ""
            echo "For local building, testing, and debugging, please refer to the [Setup & Documentation](https://github.com/${{ github.repository }}#readme) for details on the included \`local_build.bash\` and \`local_test.bash\` scripts."
            echo ""
            echo "### Links"
            echo ""
            echo "- [GitHub Container Registry](${PACKAGE_URL})"
            echo "- [Docker Hub Registry](https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/proxmox-backup-server)"
            echo "- [Upstream Changelog](https://git.proxmox.com/?p=proxmox-backup.git;a=shortlog;h=refs/tags/v${BASE_VERSION})"
            echo "- [Setup & Documentation](https://github.com/${{ github.repository }}#readme)"
          } > "$NOTES_FILE"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists. Updating notes..."
            gh release edit "$TAG" --notes-file "$NOTES_FILE" $PRERELEASE_FLAG
          else
            # Pin the tag to the current commit (the bot's version-bump
            # commit on the running branch). Without --target, gh defaults
            # to the default branch's HEAD, which placed RC tags on main
            # instead of develop and broke changelog anchoring.
            TARGET_SHA=$(git rev-parse HEAD)
            echo "Creating new release $TAG at $TARGET_SHA..."
            gh release create "$TAG" \
              $PRERELEASE_FLAG \
              --target "$TARGET_SHA" \
              --title "Proxmox Backup Server ${VERSION} for MicroOS" \
              --notes-file "$NOTES_FILE"
          fi
          rm -f "$NOTES_FILE"

      - name: Cleanup Old RC Release
        if: steps.branch.outputs.name == 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cleanup any RC tags that match the current version when finalizing on main
          CURRENT_BASE=$(sed 's/^v//' VERSION)
          RC_TAG="v${CURRENT_BASE}-RC"
          
          if gh release view "$RC_TAG" >/dev/null 2>&1; then
            # Delete the GitHub Release entry but keep the underlying git
            # tag. The tag is needed as a changelog anchor for the next RC
            # build on develop (the next PREV_TAG selection is `git tag
            # --merged origin/develop`). Without it, the next RC's notes
            # would fall back to a much older tag and re-list commits that
            # were already shipped in this stable.
            echo "Finalizing release on main. Deleting matched RC: $RC_TAG"
            gh release delete "$RC_TAG" --yes
          fi

      - name: Cleanup Old Development Builds
        if: steps.branch.outputs.name == 'develop'
        uses: snok/container-retention-policy@v3.0.1
        with:
          image-names: proxmox-backup-server
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-tags: '*-dev-*'
          cut-off: 1d
          keep-n-most-recent: 1
